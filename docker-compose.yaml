version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: bulbstore
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  product-service:
    build:
      context: .
      dockerfile: ./products/Dockerfile
    command:
      - poetry
      - run
      - python
      - main.py
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: bulbstore
    depends_on:
      - postgres
volumes:
  pgdata: